    const row = `
        <tr>
            <td>
                <a href="${editUrl}"><img src="${p.img}" class="table-img" alt="Product"></a>
            </td>
            <td class="product-name-cell">
                <a href="${editUrl}" style="text-decoration: none; color: inherit;">${p.title}</a>
            </td>
            <td class="price-cell">
                <strong>${p.price}</strong>
                ${p.old ? `<span class="old-price-table">${p.old}</span>` : ''}
            </td>
            <td>
                <button class="btn-delete-item" onclick="this.closest('tr').remove()">
                    <i class="fas fa-times"></i>
                </button>
            </td>
        </tr>
    `;
    tbody.innerHTML += row;
